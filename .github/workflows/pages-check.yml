name: サイト疎通確認

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 通常時: 毎日 09:00 JST
    # 大会当日は以下に切り替え（大会前日夜に手動で変更）:
    # - cron: '*/10 * * * *'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: SITE_URL 確認
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ]; then
            echo "SITE_URL が未設定のためスキップします"
            echo "設定方法: GitHub → Settings → Secrets → SITE_URL に Cloudflare Pages の URL を登録"
            exit 0
          fi
      - name: サイト疎通確認
        if: ${{ secrets.SITE_URL != '' }}
        run: |
          python3 tools/check_status.py \
            --site "${{ secrets.SITE_URL }}" \
            --github \
            --token "${{ secrets.GITHUB_TOKEN }}"
