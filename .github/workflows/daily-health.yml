name: 日次ヘルスチェック

on:
  schedule:
    - cron: '0 23 * * *'  # 毎日 08:00 JST
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SITE_URL 確認
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ]; then
            echo "⚠️ SITE_URL が未設定のためスキップ"
            echo "設定: GitHub → Settings → Secrets → Actions → SITE_URL"
            exit 0
          fi

      - name: サイト疎通確認
        id: check
        if: ${{ secrets.SITE_URL != '' }}
        run: |
          START=$(date +%s%3N)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.SITE_URL }}" || echo "000")
          END=$(date +%s%3N)
          ELAPSED=$((END - START))

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "elapsed_ms=$ELAPSED" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=✅ 正常" >> $GITHUB_OUTPUT
          else
            echo "status=❌ 異常 (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: ヘルスチェック結果をIssueに記録
        if: ${{ secrets.SITE_URL != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';
            const httpCode = '${{ steps.check.outputs.http_code }}';
            const elapsed = '${{ steps.check.outputs.elapsed_ms }}';
            const now = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });

            const body = `## 日次ヘルスチェック結果\n\n| 項目 | 値 |\n|---|---|\n| 実行日時 | ${now} |\n| ステータス | ${status} |\n| HTTPコード | ${httpCode} |\n| 応答時間 | ${elapsed}ms |\n| URL | ${{ secrets.SITE_URL }} |`;

            // 既存の監視Issueを検索
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'monitoring',
              state: 'open',
            });

            let issueNumber;
            if (issues.data.length > 0) {
              issueNumber = issues.data[0].number;
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[監視] 日次ヘルスチェックレポート',
                body: '大会前後のサイト監視ログを記録します。',
                labels: ['monitoring'],
              });
              issueNumber = newIssue.data.number;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            // 異常時はurgentラベルを付与
            if (httpCode !== '200') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['urgent'],
              });
            }
